<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">

<style>
.myrep-page h2{text-align:center;}
.myrep-page .form-vertical{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
}
.myrep-page input,.myrep-page select{padding:8px;}
.myrep-page .btn-save{
    margin-top:10px;padding:10px;background:#3498db;color:white;border:none;
}
.myrep-page .table-wrap{
    overflow:auto;margin-top:20px;max-height:350px;
}
.myrep-page table{
    width:100%;border-collapse:collapse;min-width:1600px;
}
.myrep-page th,.myrep-page td{
    padding:8px;text-align:center;white-space:nowrap;font-size:12px;
}
.myrep-page thead th{
    background:linear-gradient(90deg,#8e44ad,#9b59b6);
    color:white;position:sticky;top:0;
}
.myrep-page tbody tr:hover{
    background:rgba(255,255,255,0.08);
}
</style>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="myrep-page">

<h2>📊 TREKING MY REP</h2>

<!-- FILTER -->
<div>
    <input id="f_wo" placeholder="Filter WO" onkeyup="applyFilter()">
    <input id="f_tahun" placeholder="Tahun" onkeyup="applyFilter()">
    <input id="f_bulan" placeholder="Bulan" onkeyup="applyFilter()">
    <input id="f_invoice" placeholder="Invoice" onkeyup="applyFilter()">
</div>

<!-- FORM -->
<div class="form-vertical">
    <input id="wo" placeholder="WO">
    <input id="area" placeholder="Area">
    <input id="wotype" placeholder="WO Type">
    <input id="tahun" placeholder="Tahun">
    <input id="bulan" placeholder="Month">
    <input id="stb" type="number" placeholder="STB" oninput="hitung()">
    <input id="dpp" readonly placeholder="DPP">
    <input id="amount" readonly placeholder="Amount">
    <input id="tgl" type="date">
    <input id="payment" type="date">
    <select id="remark">
        <option>NOT PAID</option>
        <option>PAID</option>
    </select>
    <input id="invoice" placeholder="Invoice">
    <input id="note" placeholder="Note">
</div>

<button onclick="simpan()">💾 Simpan</button>
<button onclick="hapusTerpilih()">🗑 Hapus Terpilih</button>
<button onclick="updateMassal()">⚡ Update Massal</button>

<!-- EXCEL -->
<div>
    <input type="file" id="uploadExcel">
    <button onclick="importExcel()">📥 Upload Excel</button>
    <button onclick="exportExcel()">📤 Download Excel</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th><th>✔</th><th>ID</th><th>WO</th><th>Area</th><th>WO Type</th>
<th>Tahun</th><th>Month</th><th>STB</th><th>DPP</th><th>Amount</th>
<th>Tgl</th><th>Payment</th><th>Remark</th><th>Invoice</th><th>Note</th><th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
