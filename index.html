<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Treking</title>

<style>

/* =========================
   INDEX ONLY
========================= */

.index-page {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
.index-page .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center/cover;
    z-index: -2;
}

/* OVERLAY */
.index-page .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* CENTER */
.index-page .app {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.index-page .card-main {
    background: rgba(0,0,0,0.75);
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    color: white;
    width: 340px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
.index-page h1 {
    margin-bottom: 10px;
}

.index-page p {
    margin-bottom: 25px;
    color: #ccc;
}

/* MENU */
.index-page .menu button {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;

    display: flex;
    align-items: center;
    gap: 10px;
}

/* HOVER */
.index-page .menu button:hover {
    background: #1abc9c;
    transform: scale(1.03);
}

/* ICON */
.index-page .menu img {
    width: 28px;
    height: 28px;
}

</style>

</head>

<body class="index-page">

<div class="bg"></div>
<div class="overlay"></div>

<div class="app">

    <div class="card-main">
        <h1>ALL TREKING</h1>
        <p>Tracking System Admin</p>

        <div class="menu">

            <button onclick="goPage('page/treking-my-rep.html')">
                <img src="img/myrep.jfif">
                MyRepublic
            </button>

            <button onclick="goPage('page/treking-fs.html')">
                <img src="img/fs.png">
                FiberStar
            </button>

            <button onclick="goPage('page/treking-xl.html')">
                <img src="img/xl.png">
                XL Axiata
            </button>

        </div>
    </div>

</div>

<script>

// NAVIGASI
function goPage(url){
    window.location.href = url;
}

// AUTO GANTI BACKGROUND
const bgList = [
 "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
 "https://images.unsplash.com/photo-1491553895911-0055eca6402d",
 "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

function changeBg(){
    let bg = document.querySelector(".bg");
    let random = Math.floor(Math.random() * bgList.length);
    bg.style.backgroundImage = `url('${bgList[random]}')`;
}

changeBg();
setInterval(changeBg, 7200000); // 2 jam

</script>

</body>
</html>
