<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* =========================
   PAGE
========================= */
body{
    padding:20px;
}

h2{
    text-align:center;
}

/* =========================
   BUTTON
========================= */
.btn{
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.btn-save{background:#3498db;color:white;}
.btn-hapus{background:#e74c3c;color:white;}
.btn-update{background:#f39c12;color:white;}

/* =========================
   TABLE
========================= */
.table-wrap{
    overflow:auto;
    max-height:350px;
    margin-top:15px;
}

table{
    width:100%;
    min-width:1400px;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    text-align:center;
    white-space:nowrap;
    font-size:12px;
}

thead th{
    background:linear-gradient(90deg,#8e44ad,#9b59b6);
    color:white;
    position:sticky;
    top:0;
}

tbody tr:hover{
    background:rgba(0,0,0,0.05);
}

/* =========================
   MODAL
========================= */
#modalEdit{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:500px;
}

.edit-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.full{
    grid-column: span 2;
}

input, select{
    padding:8px;
    width:100%;
}

</style>

</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- BUTTON -->
<div style="margin-bottom:10px;">
<button class="btn btn-hapus" onclick="hapusTerpilih()">🗑 Hapus</button>
<input type="file" id="uploadExcel">
<button class="btn btn-update" onclick="importExcel()">📥 Upload</button>
<button class="btn btn-save" onclick="exportExcel()">📤 Download</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th>✔</th>
<th>ID</th>
<th>WO</th>
<th>Area</th>
<th>WO Type</th>
<th>Tahun</th>
<th>Month</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Tgl</th>
<th>Payment</th>
<th>Remark</th>
<th>Invoice</th>
<th>Note</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- ================= MODAL ================= -->
<div id="modalEdit">
<div class="modal-box">

<h3>Edit Data</h3>

<div class="edit-grid">
<input id="edit_wo" class="full">
<input id="edit_area">
<input id="edit_wotype">
<input id="edit_tahun">
<input id="edit_bulan">
<input id="edit_stb">
<input id="edit_dpp" readonly>
<input id="edit_amount" readonly>
<input id="edit_tgl" type="date">
<input id="edit_payment" type="date">

<select id="edit_remark">
<option>NOT PAID</option>
<option>PAID</option>
</select>

<input id="edit_invoice" class="full">
<input id="edit_note" class="full">
</div>

<br>

<button class="btn btn-save" onclick="saveEdit()">Save</button>
<button class="btn btn-hapus" onclick="closeModal()">Close</button>

</div>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
