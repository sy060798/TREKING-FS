<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* WRAPPER */
body{
    font-family:sans-serif;
    padding:20px;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:15px;
}

/* BUTTON */
.btn-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.btn-group button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn-save{background:#3498db;color:white;}
.btn-hapus{background:#e74c3c;color:white;}
.btn-update{background:#f39c12;color:white;}

/* TABLE */
.table-wrap{
    overflow:auto;
    max-height:400px;
    background:rgba(0,0,0,0.1);
    border-radius:10px;
}

table{
    width:100%;
    min-width:1500px;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    text-align:center;
    font-size:12px;
    white-space:nowrap;
}

thead th{
    background:#8e44ad;
    color:white;
    position:sticky;
    top:0;
}

/* MODAL */
#modalEdit{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:600px;
    max-width:95%;
}

.edit-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.full{
    grid-column:span 2;
}

.modal-box input{
    padding:8px;
    width:100%;
}

.modal-btn{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}

</style>

</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- BUTTON -->
<div class="btn-group">
    <button class="btn-save" onclick="exportExcel()">📤 Download</button>
    <button class="btn-update" onclick="document.getElementById('uploadExcel').click()">📥 Upload</button>
    <button class="btn-hapus" onclick="hapusTerpilih()">🗑 Hapus</button>
    <button class="btn-update" onclick="editMassal()">✏ Edit Massal</button>

    <input type="file" id="uploadExcel" hidden>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" onclick="checkAll(this)"></th>
<th>ID</th>
<th>WO</th>
<th>Area</th>
<th>WO Type</th>
<th>Tahun</th>
<th>Month</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Tgl</th>
<th>Payment</th>
<th>Remark</th>
<th>Invoice</th>
<th>Note</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- ================= MODAL EDIT ================= -->
<div id="modalEdit">
<div class="modal-box">

<h3 style="text-align:center;">✏ Edit Data</h3>

<div class="edit-grid">

<input id="edit_wo" class="full" placeholder="WO">
<input id="edit_area" placeholder="Area">
<input id="edit_wotype" placeholder="WO Type">

<input id="edit_tahun" placeholder="Tahun">
<input id="edit_bulan" placeholder="Bulan">

<input id="edit_stb" placeholder="STB">
<input id="edit_dpp" readonly placeholder="DPP">

<input id="edit_amount" readonly placeholder="Amount">
<input id="edit_tgl" type="date">

<input id="edit_payment" type="date">
<input id="edit_invoice" placeholder="Invoice">

<input id="edit_note" class="full" placeholder="Note">

</div>

<div class="modal-btn">
<button class="btn-save" onclick="saveEdit()">💾 Save</button>
<button class="btn-hapus" onclick="closeModal()">❌ Close</button>
</div>

</div>
</div>

<!-- JS -->
<script src="../js/myrep.js"></script>

</body>
</html>
