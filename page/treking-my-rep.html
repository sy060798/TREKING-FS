<div class="page-wrap">

    <div class="card-main form-card">

        <h2>📊 TREKING MY REP</h2>

        <!-- MENU ATAS -->
        <div class="top-menu">
            <button onclick="showTab('data')">📋 Data Treking</button>
            <button onclick="showTab('pivot')">📈 Pivot</button>
        </div>

        <!-- FORM -->
        <div class="form-vertical">

            <input id="wo" placeholder="WO">
            <input id="area" placeholder="Area">

            <input id="tahun" placeholder="Tahun">
            <input id="bulan" placeholder="Bulan">

            <input id="stb" type="number" placeholder="STB" oninput="hitung()">

            <input id="dpp" placeholder="DPP" readonly>
            <input id="amount" placeholder="AMOUNT" readonly>

            <input id="tgl" type="date">
            <input id="payment" type="date">

            <select id="remark">
                <option value="NOT PAID">NOT PAID</option>
                <option value="PAID">PAID</option>
            </select>

            <input id="invoice" placeholder="No Invoice">
            <input id="note" placeholder="Note">

        </div>

        <button class="btn-save" onclick="simpan()">💾 Simpan</button>

        <!-- DATA TABLE -->
        <div id="dataTab" class="tab-content">

            <div class="table-wrap">
                <table id="tableData">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>WO</th>
                            <th>Area</th>
                            <th>DPP</th>
                            <th>Amount</th>
                            <th>Remark</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>

        <!-- PIVOT -->
        <div id="pivotTab" class="tab-content" style="display:none;">
            <p>📈 Fitur Pivot (Coming Soon)</p>
        </div>

    </div>

</div>
