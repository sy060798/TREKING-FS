<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

.myrep-page h2{
    text-align:center;
}

/* FORM */
.form-vertical{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

input, select{
    padding:8px;
}

/* BUTTON */
.btn-save{
    margin-top:10px;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    cursor:pointer;
}

.btn-save:hover{
    background:#2980b9;
}

/* TABLE */
.table-wrap{
    overflow:auto;
    margin-top:20px;
    max-height:350px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1600px;
}

th, td{
    padding:8px;
    text-align:center;
    white-space:nowrap;
    font-size:12px;
}

thead th{
    background: linear-gradient(90deg,#8e44ad,#9b59b6);
    color:white;
    position:sticky;
    top:0;
}

tbody tr:hover{
    background:rgba(255,255,255,0.08);
}

</style>

</head>

<body class="myrep-page">

<h2>📊 TREKING MY REP</h2>

<!-- FORM -->
<div class="form-vertical">
    <input id="wo" placeholder="WO">
    <input id="area" placeholder="Area">
    <input id="wotype" placeholder="WO Type">

    <input id="tahun" placeholder="Tahun">
    <input id="bulan" placeholder="Month">
    <input id="stb" type="number" placeholder="STB" oninput="hitung()">

    <input id="dpp" placeholder="DPP" readonly>
    <input id="amount" placeholder="Amount" readonly>
    <input id="tgl" type="date">

    <input id="payment" type="date">

    <select id="remark">
        <option>NOT PAID</option>
        <option>PAID</option>
    </select>

    <input id="invoice" placeholder="Invoice">
    <input id="note" placeholder="Note">
</div>

<button class="btn-save" onclick="simpan()">💾 Simpan</button>
<button onclick="hapusTerpilih()">🗑 Hapus Terpilih</button>
<button onclick="updateMassal()">⚡ Update Massal</button>

<!-- EXCEL -->
<div style="margin-top:10px;">
    <input type="file" id="uploadExcel">
    <button onclick="importExcel()">📥 Upload Excel</button>
    <button onclick="exportExcel()">📤 Download Excel</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th>✔</th>
<th>ID</th>
<th>WO</th>
<th>Area</th>
<th>WO Type</th>
<th>Tahun</th>
<th>Month</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Tgl</th>
<th>Payment</th>
<th>Remark</th>
<th>Invoice</th>
<th>Note</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
