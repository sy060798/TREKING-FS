<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}
h2{text-align:center;}
.menu{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.menu button{
  background:#8e44ad;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
.btn-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.blue{background:#3498db;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#f39c12;color:white;}
.table-wrap{
  overflow:auto;
  max-height:500px;
  background:#222;
  border-radius:10px;
}
table{
  width:100%;
  min-width:1200px;
  border-collapse:collapse;
}
th,td{
  padding:6px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #444;
  cursor:pointer;
}
thead th{
  background:#8e44ad;
  position:sticky;
  top:0;
}
.tab{display:none;}
.active{display:block;}
#modalEdit{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:320px;
}
.box input{
  width:100%;
  padding:6px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #555;
}

  /* FILTER */
.filter-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
  
/* ==================== CHART GRID ==================== */
.chart-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 16px;
}

/* ==================== CHART CARD ==================== */
.chart-card{
  background: #1e1e1e;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.chart-card:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.45);
}
.chart-card::before{
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
  opacity: 0.8;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
}

/* ==================== SIZE CANVAS ==================== */
canvas{
  width: 100% !important;
  height: 260px !important;
}

/* ==================== WRAPPER PIVOT ==================== */
#pivot{
  max-width: 1100px;
  margin: auto;
  padding: 0 12px;
}

/* ==================== PIVOT TABLE ==================== */
.table-wrapper{
  max-width: 1100px;
  margin:auto;
  background:#1e1e1e;
  border-radius:12px;
  overflow:hidden;
  margin-top:20px;
}
.table-wrapper thead{
  background:#6d28d9;
  color:white;
}
.table-body{
  max-height:220px;
  overflow-y:auto;
}
table{
  width:100%;
  border-collapse: collapse;
}
  
#upload{display:none;}
</style>
</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- MENU TAB -->
<div class="menu">
  <button class="active" onclick="showTab('data')">📋 Data</button>
  <button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<!-- BUTTON GROUP -->
<div class="btn-group">
  <button class="blue" onclick="exportExcel()">⬇ Download</button>
  <button class="orange" onclick="triggerUpload()">⬆ Upload</button>
  <button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
  <button class="orange" onclick="editMassal()">✏ Edit Massal</button>
  <button class="blue" onclick="kirimKeServer()">🚀 Upload Server</button>

  <!-- INPUT FILE HIDDEN -->
  <input type="file" id="upload" accept=".xlsx,.xls" style="display:none;">
</div>

<!-- TAB DATA -->
<div id="data" class="tab active">
  <div class="table-wrap">
    <table id="tableData">
      <thead>
        <tr>
          <th>No</th>
          <th><input type="checkbox" id="checkAll"></th>
          <th>ID</th>
          <th>WO</th>
          <th>Tanggal</th>
          <th>Bulan</th>
          <th>Area</th>
          <th>WO Type</th>
          <th>STB</th>
          <th>DPP</th>
          <th>Amount</th>
          <th>Remark</th>
          <th>Server</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data akan di-render oleh JS -->
      </tbody>
    </table>
  </div>
</div>

<!-- TAB PIVOT -->
<div id="pivot" class="tab">
  <h3>📈 Pivot Grafik</h3>

  <!-- FILTER -->
  <div class="filter-box">
    <select id="filterArea" onchange="generatePivot()">
      <option value="">Semua Area</option>
    </select>

    <select id="filterBulan" onchange="generatePivot()">
      <option value="">Semua Bulan</option>
    </select>

    <select id="filterRemark" onchange="generatePivot()">
      <option value="">Semua Status</option>
      <option value="PAID">PAID</option>
      <option value="NOT PAID">NOT PAID</option>
    </select>
  </div>

  <!-- GRID CHART -->
  <div class="chart-grid">
    <div class="chart-card">
      <canvas id="chartAmount"></canvas>
    </div>
    <div class="chart-card">
      <canvas id="chartStatus"></canvas>
    </div>
  </div>

  <!-- PIVOT TABLE -->
  <h3 style="margin-top:20px;">📋 Pivot Table</h3>
  <div class="table-wrapper">
    <table class="pivot-header">
      <thead>
        <tr>
          <th>Area</th>
          <th>Paid (Count)</th>
          <th>Not Paid (Count)</th>
          <th>Paid (Rp)</th>
          <th>Not Paid (Rp)</th>
          <th>Total</th>
        </tr>
      </thead>
    </table>

    <div class="table-body">
      <table>
        <tbody id="pivotBody">
          <!-- Pivot data akan di-render oleh JS -->
        </tbody>
      </table>
    </div>

    <table class="pivot-footer">
      <tbody>
        <tr class="total-row" id="pivotTotal"></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL EDIT -->
<div id="modalEdit">
<div class="box">
<h3>Edit Data</h3>
<input id="edit_wo" placeholder="WO">
<input id="edit_area" placeholder="Area">
<input id="edit_stb" placeholder="STB">
<input id="edit_remark" placeholder="Remark">
<button onclick="saveEdit()" class="blue">Save</button>
<button onclick="closeModal()" class="red">Close</button>
</div>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
