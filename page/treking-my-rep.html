<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}
h2{text-align:center;}
.menu{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.menu button{
  background:#8e44ad;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
.btn-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.blue{background:#3498db;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#f39c12;color:white;}
.table-wrap{
  overflow:auto;
  max-height:500px;
  background:#222;
  border-radius:10px;
}
table{
  width:100%;
  min-width:1200px;
  border-collapse:collapse;
}
th,td{
  padding:6px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #444;
  cursor:pointer;
}
thead th{
  background:#8e44ad;
  position:sticky;
  top:0;
}
.tab{display:none;}
.active{display:block;}
#modalEdit{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:320px;
}
.box input{
  width:100%;
  padding:6px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #555;
}

  /* FILTER */
.filter-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
  
/* ==================== CHART GRID ==================== */
.chart-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2 kolom desktop */
  gap: 20px; /* jarak antar chart */
  margin-top: 16px;
}

/* ==================== CHART CARD ==================== */
.chart-card{
  background: #1e1e1e; /* lebih terang & modern */
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* HOVER EFFECT */
.chart-card:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.45);
}

/* TOP ACCENT LINE */
.chart-card::before{
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
  opacity: 0.8;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
}

/* CHART FULL WIDTH */
.chart-card.full{
  grid-column: span 2;
}

/* ==================== SIZE CANVAS ==================== */
canvas{
  width: 100% !important;
  height: 260px !important; /* nyaman di laptop */
}

/* ==================== WRAPPER PIVOT ==================== */
#pivot{
  max-width: 1100px;
  margin: auto;
  padding: 0 12px; /* biar nggak mepet kiri-kanan */
}

/* ==================== RESPONSIVE HP ==================== */
@media(max-width:768px){
  .chart-grid{
    grid-template-columns: 1fr; /* 1 kolom HP */
    gap: 14px;
  }

  .chart-card.full{
    grid-column: span 1; /* full chart jadi 1 kolom */
  }

  canvas{
    height: 220px !important; /* lebih pas di layar kecil */
  }
}
#upload{display:none;}
</style>
</head>

<body>

<h2>📊 TREKING MY REP</h2>

<div class="menu">
<button onclick="showTab('data')">📋 Data</button>
<button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<div class="btn-group">
<button class="blue" onclick="exportExcel()">⬇ Download</button>
<button class="orange" onclick="triggerUpload()">⬆ Upload</button>
<button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
<button class="orange" onclick="editMassal()">✏ Edit Massal</button>
<button class="blue" onclick="kirimKeServer()">🚀 Upload Server</button>

<input type="file" id="upload" accept=".xlsx,.xls">
</div>

<!-- TAB DATA -->
<div id="data" class="tab active">
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkAll"></th>
<th>ID</th>
<th>WO</th>
<th>Tanggal</th>
<th>Bulan</th>
<th>Area</th>
<th>WO Type</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Remark</th>
<th>Server</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB PIVOT -->
<div id="pivot" class="tab">
  <h3>📈 Pivot Grafik</h3>

  <!-- FILTER -->
  <div class="filter-box">
    <select id="filterArea" onchange="generatePivot()">
      <option value="">Semua Area</option>
    </select>

    <select id="filterBulan" onchange="generatePivot()">
      <option value="">Semua Bulan</option>
    </select>

    <select id="filterRemark" onchange="generatePivot()">
      <option value="">Semua Status</option>
      <option value="PAID">PAID</option>
      <option value="NOT PAID">NOT PAID</option>
    </select>
  </div>

  <!-- GRID CHART -->
  <div class="chart-grid">

    <!-- CHART 1: TOTAL AMOUNT -->
    <div class="chart-card">
      <canvas id="chartAmount"></canvas>
    </div>

    <!-- CHART 2: PAID vs NOT PAID -->
    <div class="chart-card">
      <canvas id="chartStatus"></canvas>
    </div>

    <!-- CHART 3: AREA STATUS (STACKED) FULL WIDTH -->
    <div class="chart-card full">
      <canvas id="chartAreaStatus"></canvas>
    </div>

  </div>

  <!-- PIVOT TABLE -->
  <h3 style="margin-top:20px;">📋 Pivot Table</h3>
  <div class="table-wrap">
    <table id="pivotTable">
      <thead>
        <tr>
          <th>Area</th>
          <th>Total STB</th>
          <th>Total Amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- MODAL EDIT -->
<div id="modalEdit">
<div class="box">
<h3>Edit Data</h3>
<input id="edit_wo" placeholder="WO">
<input id="edit_area" placeholder="Area">
<input id="edit_stb" placeholder="STB">
<input id="edit_remark" placeholder="Remark">
<button onclick="saveEdit()" class="blue">Save</button>
<button onclick="closeModal()" class="red">Close</button>
</div>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
