<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;padding:20px;background:#f5f5f5;}

h2{text-align:center;margin-bottom:10px;}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.menu button{
    background:#8e44ad;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

.btn-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}
button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.blue{background:#3498db;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#f39c12;color:white;}

.table-wrap{
    overflow:auto;
    max-height:450px;
    background:white;
    border-radius:10px;
}
table{
    width:100%;
    min-width:1300px;
    border-collapse:collapse;
}
th,td{
    padding:6px;
    text-align:center;
    font-size:12px;
    border-bottom:1px solid #ddd;
}
thead th{
    background:#8e44ad;
    color:white;
    position:sticky;
    top:0;
}

.tab{display:none;}
.active{display:block;}

#modalEdit{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:350px;
}
.box input{
    width:100%;
    padding:6px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- MENU -->
<div class="menu">
    <button onclick="showTab('data')">📋 Data</button>
    <button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<!-- BUTTON -->
<div class="btn-group">
    <button class="blue" onclick="exportExcel()">⬇ Download</button>
    <button class="orange" onclick="document.getElementById('upload').click()">⬆ Upload</button>
    <button class="orange" onclick="cekUpdate()">🔄 Update</button>
    <button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
    <button class="orange" onclick="editMassal()">✏ Edit Massal</button>

    <input type="file" id="upload" hidden onchange="importExcel()">
</div>

<!-- DATA -->
<div id="data" class="tab active">
<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" onclick="checkAll(this)"></th>
<th>ID</th>
<th>WO</th>
<th>Area</th>
<th>WO Type</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Remark</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- PIVOT -->
<div id="pivot" class="tab">
<h3>📈 Pivot Grafik</h3>
<canvas id="chartPivot"></canvas>
</div>

<!-- MODAL -->
<div id="modalEdit">
<div class="box">

<h3>Edit Data</h3>

<input id="edit_wo" placeholder="WO">
<input id="edit_area" placeholder="Area">
<input id="edit_stb" placeholder="STB">
<input id="edit_remark" placeholder="Remark">

<button class="blue" onclick="saveEdit()">💾 Save</button>
<button class="red" onclick="closeModal()">❌ Close</button>

</div>
</div>

<!-- JS -->
<script src="../js/myrep.js"></script>

</body>
</html>
