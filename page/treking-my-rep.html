<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}
h2{text-align:center;}

.menu{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.menu button{
  background:#8e44ad;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

.btn-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  z-index:10; /* 🔥 FIX klik */
}

.blue{background:#3498db;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#f39c12;color:white;}

.table-wrap{
  overflow:auto;
  max-height:500px;
  background:#222;
  border-radius:10px;
}

table{
  width:100%;
  min-width:1300px;
  border-collapse:collapse;
}

th,td{
  padding:6px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #444;
}

thead th{
  background:#8e44ad;
  position:sticky;
  top:0;
  z-index:5; /* 🔥 FIX HEADER KLIK */
}

/* 🔥 FILTER SELECT DI HEADER */
thead select{
  width:100%;
  margin-top:4px;
  font-size:11px;
  pointer-events:auto;
}

.tab{
  display:none;
  position:relative;
  z-index:1;
}

.tab.active{
  display:block;
  z-index:5;
}

#modalEdit{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:320px;
}

.box input{
  width:100%;
  padding:6px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #555;
}

/* FILTER */
.filter-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap; 
  align-items:center;
}

.filter-box input{
  width:140px; 
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #555;
  background:#222;
  color:white;
}

/* NOTE WIDTH */
th:nth-child(13), td:nth-child(13){
  min-width:150px;
}
  /* ==================== CHART GRID ==================== */
.chart-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 16px;
}

/* ==================== CHART CARD ==================== */
.chart-card{
  background: #1e1e1e;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.chart-card:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.45);
}

.chart-card::before{
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
  opacity: 0.8;
}

/* ==================== SIZE CANVAS ==================== */
canvas{
  width: 100% !important;
  height: 260px !important;
  pointer-events:auto; 
}

/* ==================== WRAPPER PIVOT ==================== */
#pivot{
  max-width: 1100px;
  margin: auto;
  padding: 0 12px;
}

/* ==================== FILTER BOX ==================== */
.filter-box select{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:6px;
  border-radius:6px;
}

/* ==================== PIVOT TABLE ==================== */
.table-wrapper{
  max-width: 1100px;
  margin:auto;
  background:#1e1e1e;
  border-radius:12px;
  margin-top:20px;

  max-height: 300px;
  overflow-y: auto;
}

/* TABLE FIX */
.table-wrapper table{
  width:100%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* HEADER */
.table-wrapper thead th{
  background:#6d28d9;
  color:white;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* CELL */
.table-wrapper th,
.table-wrapper td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #444;
  white-space: nowrap;
}

/* ANGKA RATA KANAN */
.table-wrapper td:nth-child(4),
.table-wrapper td:nth-child(5),
.table-wrapper td:nth-child(6){
  text-align:right;
}

/* HOVER */
.table-wrapper tbody tr:hover{
  background:#2a2a2a;
}

/* TOTAL ROW */
.total-row{
  background:#111;
  font-weight:bold;
  color:#22c55e;
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px){
  .chart-grid{
    grid-template-columns: 1fr;
  }
}

#upload{display:none;}
</style>
</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- MENU -->
<div class="menu">
  <button onclick="showTab('data')">📋 Data</button>
  <button onclick="showTab('pivot')">📈 Pivot</button>
</div>


<!-- BUTTON (ATAS) -->
<div class="btn-group">
  <button class="blue" onclick="exportExcel()">⬇ Download</button>
  <button class="orange" onclick="triggerUpload()">⬆ Upload</button>
  <button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
  <button class="orange" onclick="editMassal()">✏ Edit Massal</button>
  <button class="blue" onclick="kirimKeServer()">🚀 Upload Server</button>

  <input type="file" id="upload" accept=".xlsx,.xls">
</div>

<!-- FILTER (DI BAWAH, TAPI KE SAMPING) -->
<div class="filter-box">
  <input type="text" id="filter_wo" placeholder="WO">
  <input type="text" id="filter_bulan" placeholder="Bulan">
  <input type="text" id="filter_area" placeholder="Area">
</div>

  
<!-- ================= DATA ================= -->
<div id="data" class="tab active">
  <div class="table-wrap">
    <table id="tableData">
      <thead>
        <tr>
          <th>No</th>
          <th><input type="checkbox" id="checkAll"></th>
          <th>ID</th>
          <th>WO</th>
          <th>Tanggal</th>
          <th>Bulan</th>
          <th>Area</th>
          <th>WO Type</th>
          <th>STB</th>
          <th>DPP</th>
          <th>Amount</th>

          <th>Remark</th>

          <!-- 🔥 NOTE + FILTER -->
          <th>
            Note
            <select id="filterNote">
              <option value="">Semua</option>
            </select>
          </th>

          <th>Server</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ================= PIVOT ================= -->
<div id="pivot" class="tab">

  <h3>📈 Pivot Grafik</h3>

  <div class="filter-box">
    <select id="filterArea"></select>
    <select id="filterBulan"></select>
    <select id="filterRemark"></select>
  </div>

 <div class="chart-grid">

  <div class="chart-card">
    <canvas id="chartAmount"></canvas>
  </div>

  <div class="chart-card">
    <canvas id="chartStatus"></canvas>
  </div>

</div>
  <h3 style="margin-top:20px;">📋 Pivot Table</h3>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Area</th>
          <th>Paid</th>
          <th>Not Paid</th>
          <th>Paid Rp</th>
          <th>Not Paid Rp</th>
          <th>Total</th>
        </tr>
      </thead>

      <tbody id="pivotBody"></tbody>
      <tfoot>
        <tr class="total-row" id="pivotTotal"></tr>
      </tfoot>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="modalEdit">
  <div class="box">
    <h3>Edit Data</h3>
    <input id="edit_wo">
    <input id="edit_area">
    <input id="edit_stb">
    <input id="edit_remark">
    <button onclick="saveEdit()" class="blue">Save</button>
    <button onclick="closeModal()" class="red">Close</button>
  </div>
</div>

<!-- 🔥 FIX PATH JS (INI PENYEBAB UTAMA ERROR KAMU) -->
<script src="../js/myrep.js"></script>

<!-- 🔥 BACKUP BIAR GA ERROR -->
<script>
function triggerUpload(){
  document.getElementById('upload').click();
}
</script>

</body>
</html>
