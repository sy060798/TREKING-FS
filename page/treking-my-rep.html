<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:sans-serif;padding:20px;}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.menu{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.menu button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#8e44ad;
    color:white;
}

/* BUTTON */
.btn-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:15px 0;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.blue{background:#3498db;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#f39c12;color:white;}

/* TABLE */
.table-wrap{
    overflow:auto;
    max-height:450px;
}

table{
    width:100%;
    min-width:1500px;
    border-collapse:collapse;
}

th,td{
    padding:6px;
    font-size:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

thead th{
    background:#8e44ad;
    color:white;
    position:sticky;
    top:0;
}

/* TAB */
.tab{display:none;}
.active{display:block;}

/* MODAL */
#modalEdit{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:400px;
}

.box input{
    width:100%;
    margin-bottom:8px;
    padding:6px;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 TREKING MY REP</h2>
</div>

<!-- MENU -->
<div class="menu">
    <button onclick="showTab('data')">📋 Data</button>
    <button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<!-- BUTTON -->
<div class="btn-group">
    <button class="blue" onclick="exportExcel()">⬇ Download</button>
    <button class="orange" onclick="document.getElementById('upload').click()">⬆ Upload</button>
    <button class="orange" onclick="cekUpdate()">🔄 Update</button>
    <button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
    <button class="orange" onclick="editMassal()">✏ Edit Massal</button>

    <input type="file" id="upload" hidden onchange="importExcel()">
</div>

<!-- DATA TAB -->
<div id="data" class="tab active">

<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" onclick="checkAll(this)"></th>
<th>ID</th>
<th>WO</th>
<th>Area</th>
<th>WO Type</th>
<th>STB</th>
<th>DPP</th>
<th>Amount</th>
<th>Remark</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- PIVOT TAB -->
<div id="pivot" class="tab">
<h3>📈 Pivot Sederhana</h3>
<div id="pivotResult"></div>
</div>

<!-- MODAL EDIT -->
<div id="modalEdit">
<div class="box">

<h3>Edit Data</h3>

<input id="edit_wo" placeholder="WO">
<input id="edit_area" placeholder="Area">
<input id="edit_stb" placeholder="STB">
<input id="edit_remark" placeholder="Remark">

<button onclick="saveEdit()" class="blue">💾 Save</button>
<button onclick="closeModal()" class="red">❌ Close</button>

</div>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
