<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">

<style>

/* =========================
   MYREP ONLY (AMAN)
========================= */

.myrep-page h2{
    text-align:center;
}

/* FORM */
.myrep-page .form-vertical{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

.myrep-page input, 
.myrep-page select{
    padding:8px;
}

/* BUTTON */
.myrep-page .btn-save{
    margin-top:10px;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    cursor:pointer;
}

.myrep-page .btn-save:hover{
    background:#2980b9;
}

/* MENU */
.myrep-page .top-menu{
    text-align:center;
    margin-bottom:15px;
}

.myrep-page .top-menu button{
    margin:5px;
    padding:8px 12px;
}

/* TABLE */
.myrep-page .table-wrap{
    overflow:auto;
    margin-top:20px;
    max-height:300px;
}

.myrep-page table{
    width:100%;
    border-collapse:collapse;
}

.myrep-page thead tr:first-child th{
    background: linear-gradient(90deg, #8e44ad, #9b59b6);
    color:white;
}

.myrep-page th, 
.myrep-page td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.myrep-page tbody tr:hover{
    background: rgba(255,255,255,0.08);
}

</style>

</head>

<body class="myrep-page">

<h2>📊 TREKING MY REP</h2>

<div class="top-menu">
    <button onclick="showTab('data')">📋 Data</button>
    <button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<!-- FORM -->
<div class="form-vertical">
    <input id="wo" placeholder="WO">
    <input id="area" placeholder="Area">
    <input id="wotype" placeholder="WO Type">

    <input id="tahun" placeholder="Tahun">
    <input id="bulan" placeholder="Month">
    <input id="stb" type="number" placeholder="STB" oninput="hitung()">

    <input id="dpp" placeholder="DPP" readonly>
    <input id="amount" placeholder="Amount" readonly>
    <input id="tgl" type="date">

    <input id="payment" type="date">

    <select id="remark">
        <option>NOT PAID</option>
        <option>PAID</option>
    </select>

    <input id="invoice" placeholder="Invoice">
    <input id="note" placeholder="Note">
</div>

<button class="btn-save" onclick="simpan()">💾 Simpan</button>
<button onclick="hapusTerpilih()">🗑 Hapus Terpilih</button>
<button onclick="updateMassal()">⚡ Update Massal</button>

<!-- TABLE -->
<div id="dataTab">
<div class="table-wrap">
<table id="tableData">

<thead>
<tr>
    <th>No</th>
    <th>✔</th>
    <th>ID</th>
    <th>WO</th>
    <th>Area</th>
    <th>WO Type</th>
    <th>Tahun</th>
    <th>Month</th>
    <th>STB</th>
    <th>DPP</th>
    <th>Amount</th>
    <th>Tgl</th>
    <th>Payment</th>
    <th>Remark</th>
    <th>Invoice</th>
    <th>Note</th>
    <th>Aksi</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>
</div>

<div id="pivotTab" style="display:none">
    <p>Pivot coming soon...</p>
</div>

<script src="../js/myrep.js"></script>

</body>
</html>
