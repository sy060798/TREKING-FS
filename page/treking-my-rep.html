<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:sans-serif;margin:20px}

/* MENU */
.menu-tab{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.menu-tab button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#8e44ad;
    color:white;
    cursor:pointer;
}

/* BUTTON */
.btn-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}
.btn-group button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn-save{background:#3498db;color:white;}
.btn-hapus{background:#e74c3c;color:white;}
.btn-update{background:#f39c12;color:white;}

/* TABLE */
.table-wrap{
    overflow:auto;
    max-height:400px;
    background:rgba(0,0,0,0.1);
    border-radius:8px;
}
table{
    width:100%;
    min-width:1400px;
    border-collapse:collapse;
}
th,td{
    padding:8px;
    text-align:center;
    font-size:12px;
    border-bottom:1px solid #ddd;
}
thead th{
    background:#8e44ad;
    color:white;
    position:sticky;
    top:0;
}

/* PAGE */
.page{
    display:none;
}
.page.active{
    display:block;
}
</style>

</head>

<body>

<h2>📊 TREKING MY REP</h2>

<!-- MENU -->
<div class="menu-tab">
    <button onclick="showPage('tracking')">📊 Data Tracking</button>
    <button onclick="showPage('pivot')">📈 Pivot</button>
</div>

<!-- ================= PAGE TRACKING ================= -->
<div id="page-tracking" class="page active">

    <!-- BUTTON -->
    <div class="btn-group">
        <button class="btn-save" onclick="exportExcel()">📤 Download</button>
        <button class="btn-update" onclick="document.getElementById('uploadExcel').click()">📥 Upload</button>
        <button class="btn-hapus" onclick="hapusTerpilih()">🗑 Hapus</button>
        <button class="btn-update" onclick="editMassal()">✏ Edit Massal</button>

        <input type="file" id="uploadExcel" hidden>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
        <table id="tableData">
            <thead>
                <tr>
                    <th>No</th>
                    <th><input type="checkbox" onclick="checkAll(this)"></th>
                    <th>ID</th>
                    <th>WO</th>
                    <th>Area</th>
                    <th>WO Type</th>
                    <th>Tahun</th>
                    <th>Month</th>
                    <th>STB</th>
                    <th>DPP</th>
                    <th>Amount</th>
                    <th>Tgl</th>
                    <th>Payment</th>
                    <th>Remark</th>
                    <th>Invoice</th>
                    <th>Note</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- ================= PAGE PIVOT ================= -->
<div id="page-pivot" class="page">
    <h3>📈 Pivot</h3>
    <p>Isi pivot nanti di sini</p>
</div>

<!-- JS -->
<script src="../js/myrep.js"></script>

</body>
</html>
