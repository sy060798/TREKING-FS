<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treking My Rep</title>

<!-- =========================
     🔵 GLOBAL CSS (INDEX)
     TIDAK DIUBAH
========================= -->
<link rel="stylesheet" href="../style.css">


<!-- =========================
     🟢 CSS KHUSUS MYREP
     AMAN - TIDAK GANGGU INDEX
========================= -->
<style>

/* WRAPPER KHUSUS */
.myrep-page h2{
    text-align:center;
}

/* TABLE */
.myrep-page .table-wrap{
    overflow-x:auto;
    margin-top:20px;
}

.myrep-page table{
    width:100%;
    border-collapse:collapse;
}

/* HEADER */
.myrep-page thead tr:first-child th{
    background: linear-gradient(90deg, #8e44ad, #9b59b6);
    color:white;
}

/* SEARCH */
.myrep-page thead input{
    width:90%;
    padding:5px;
    font-size:12px;
    border-radius:5px;
    border:none;
}

/* CELL */
.myrep-page th, 
.myrep-page td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* HOVER */
.myrep-page tbody tr:hover{
    background: rgba(255,255,255,0.08);
}

/* BADGE */
.myrep-page .badge{
    padding:4px 8px;
    border-radius:5px;
    color:white;
    font-size:11px;
}

.myrep-page .badge-area{
    background:#3498db;
}

.myrep-page .badge-paid{
    background:#2ecc71;
}

.myrep-page .badge-not{
    background:#e67e22;
}

/* FORM GRID */
.myrep-page .form-vertical{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

/* INPUT */
.myrep-page input, 
.myrep-page select{
    padding:8px;
}

/* BUTTON */
.myrep-page .btn-save{
    margin-top:10px;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    cursor:pointer;
}

.myrep-page .btn-save:hover{
    background:#2980b9;
}

/* MENU */
.myrep-page .top-menu{
    text-align:center;
    margin-bottom:15px;
}

.myrep-page .top-menu button{
    margin:5px;
    padding:8px 12px;
}

</style>

</head>


<!-- =========================
     🟡 BODY MYREP
     (WAJIB ADA CLASS)
========================= -->
<body class="myrep-page">

<h2>📊 TREKING MY REP</h2>

<div class="top-menu">
    <button onclick="showTab('data')">📋 Data</button>
    <button onclick="showTab('pivot')">📈 Pivot</button>
</div>

<div class="form-vertical">
    <input id="wo" placeholder="WO">
    <input id="area" placeholder="Area">
    <input id="tahun" placeholder="Tahun">

    <input id="bulan" placeholder="Bulan">
    <input id="stb" type="number" placeholder="STB" oninput="hitung()">
    <input id="dpp" placeholder="DPP" readonly>

    <input id="amount" placeholder="Amount" readonly>
    <input id="tgl" type="date">
    <input id="payment" type="date">

    <select id="remark">
        <option>NOT PAID</option>
        <option>PAID</option>
    </select>

    <input id="invoice" placeholder="Invoice">
    <input id="note" placeholder="Note">
</div>

<button class="btn-save" onclick="simpan()">💾 Simpan</button>


<!-- =========================
     📋 DATA TABLE
========================= -->
<div id="dataTab">

<div class="table-wrap">
<table id="tableData">

<thead>
<tr>
    <th>No</th>
    <th>WO</th>
    <th>Area</th>
    <th>DPP</th>
    <th>Amount</th>
    <th>Remark</th>
</tr>

<tr>
    <th></th>
    <th><input onkeyup="filterTable(1)"></th>
    <th><input onkeyup="filterTable(2)"></th>
    <th><input onkeyup="filterTable(3)"></th>
    <th><input onkeyup="filterTable(4)"></th>
    <th><input onkeyup="filterTable(5)"></th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

</div>


<!-- =========================
     📈 PIVOT
========================= -->
<div id="pivotTab" style="display:none">
    <p>Pivot coming soon...</p>
</div>


<!-- =========================
     🟠 JAVASCRIPT
========================= -->
<script src="../js/myrep.js"></script>

</body>
</html>
